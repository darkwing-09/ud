version: "3.9"

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: educore_api
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - educore_net

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: educore_worker
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4 -Q high,default,low
    networks:
      - educore_net

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: educore_beat
    env_file:
      - ./backend/.env
    depends_on:
      - redis
      - worker
    volumes:
      - ./backend:/app
    command: celery -A app.workers.celery_app beat --loglevel=info --scheduler celery.beat.PersistentScheduler
    networks:
      - educore_net

  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: educore_flower
    env_file:
      - ./backend/.env
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - worker
    command: celery -A app.workers.celery_app flower --port=5555
    networks:
      - educore_net

  postgres:
    image: postgres:16-alpine
    container_name: educore_postgres
    environment:
      POSTGRES_USER: educore
      POSTGRES_PASSWORD: educore_pass
      POSTGRES_DB: educore_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U educore -d educore_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - educore_net

  redis:
    image: redis:7-alpine
    container_name: educore_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - educore_net

  mailhog:
    image: mailhog/mailhog:latest
    container_name: educore_mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - educore_net

  minio:
    image: minio/minio:latest
    container_name: educore_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - educore_net

networks:
  educore_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
