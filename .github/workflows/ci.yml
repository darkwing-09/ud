name: EduCore CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: educore
          POSTGRES_PASSWORD: educore_pass
          POSTGRES_DB: educore_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'
    
    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        
    - name: Lint with ruff
      working-directory: ./backend
      run: |
        ruff check app/ tests/
        
    - name: Type check with mypy
      working-directory: ./backend
      run: |
        mypy app/
        
    - name: Run pytest
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql+asyncpg://educore:educore_pass@localhost:5432/educore_db
        REDIS_URL: redis://localhost:6379/0
        SECRET_KEY: test-secret-key-for-ci-run-needs-to-be-32-chars-long
        APP_ENV: testing
      run: |
        pytest tests/ -v

  frontend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: ./frontend/package-lock.json
        
    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci
      
    - name: Type check
      working-directory: ./frontend
      run: npm run typecheck || true
      
    - name: Build
      working-directory: ./frontend
      run: npm run build
