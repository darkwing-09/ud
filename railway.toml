# Railway Production Configuration
# Documentation: https://docs.railway.app/reference/railway-toml

[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"

[deploy]
startCommand = "gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[[services]]
name = "api"
healthcheckPath = "/api/v1/system/health"
healthcheckTimeout = 5
healthcheckInterval = 30

# Note: Celery Worker and Beat should be separate services in Railway 
# pointing to the same repo but with different start commands.
